<!DOCTYPE html><html lang="en"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
  <meta charset="UTF-8">
  <title>Break-Even Charts – Final</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 2rem;
      text-align: center;
    }
    .chart-container {
      max-width: 720px;
      background: white;
      border-radius: 8px;
      padding: 1rem;
      margin: 2rem auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    canvas {
      width: 100% !important;
      height: auto !important;
    }
  </style>
</head>
<body>

  <h1>Break-Even Analysis – 3 Phases</h1>

  <div class="chart-container">
    <h2>Phase 1 – MVP (~1,420 Users)</h2>
    <canvas id="chart1"></canvas>
  </div>

  <div class="chart-container">
    <h2>Phase 2 – Engineers (~19,600 Users)</h2>
    <canvas id="chart2"></canvas>
  </div>

  <div class="chart-container">
    <h2>Phase 3 – Full Ops (~52,444 Users)</h2>
    <canvas id="chart3"></canvas>
  </div>

  <script>
    function generateData(fixedCost, variablePerUser) {
      const users = Array.from({ length: 60 }, (_, i) => i * 1000);
      const revenue = users.map(u => u * 65);
      const cost = users.map(u => fixedCost + u * variablePerUser);
      return { users, revenue, cost };
    }

    function createChart(canvasId, fixedCost, variableCost, title) {
      const { users, revenue, cost } = generateData(fixedCost, variableCost);

      new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
          labels: users,
          datasets: [
            {
              label: 'Revenue (HKD)',
              data: revenue,
              borderColor: 'green',
              borderWidth: 2,
              fill: false
            },
            {
              label: 'Total Cost (HKD)',
              data: cost,
              borderColor: 'red',
              borderWidth: 2,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            tooltip: {
              mode: 'index',
              intersect: false
            },
            legend: {
              position: 'top'
            }
          },
          interaction: {
            mode: 'nearest',
            axis: 'x',
            intersect: false
          },
          scales: {
            x: {
              title: {
                display: true,
                text: 'Monthly Paying Users'
              }
            },
            y: {
              title: {
                display: true,
                text: 'HKD (Revenue / Cost)'
              },
              beginAtZero: true
            }
          }
        }
      });
    }

    createChart('chart1', 81000, 8, 'Phase 1');
    createChart('chart2', 980000, 15, 'Phase 2');
    createChart('chart3', 2360000, 20, 'Phase 3');
  </script>



</body></html>
